<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Выписной эпикриз - Dmed.Стационар</title>
    <link rel="stylesheet" href="../assets/mock.css" />
  </head>
  <body data-page-type="discharge_summary">

    <!-- Header -->
    <div class="header">
      <div class="dmed-logo">
        <div class="dmed-logo-icon">✦</div>
        <div><div class="dmed-logo-text">Damu.AI</div>
        <div class="app-version">Browser AI-agent · v1.0</div></div>
      </div>
      <div class="user-block">
        <div>
          <div class="user-name">САРЕНОВА БОТАКОЗ МАКСАТОВНА</div>
          <div class="user-position">Неврология детская (Невропатолог детский)</div>
        </div>
        <span class="caret-icon">▾</span>
      </div>
    </div>

    <div class="content">

      <div class="standalone-back">
        <a href="./patient-card.html">← К карточке пациента</a>
        <h1>Выписной эпикриз</h1>
        <span class="patient-meta">ДӘУРЕНҚЫЗЫ ТОМИРИС · №565</span>
      </div>

      <div class="panel">
        <div class="panel-heading">
          <div class="panel-title">Выписной эпикриз — История болезни №2121368</div>
        </div>
        <div class="panel-body">

          <div class="row mb-3">
            <div class="col-4">
              <div class="form-group">
                <label>Дата поступления</label>
                <input class="form-control" type="datetime-local" value="2026-04-13T05:26" readonly />
              </div>
            </div>
            <div class="col-4">
              <div class="form-group">
                <label>Дата выписки</label>
                <input class="form-control" type="datetime-local" value="2026-04-20T10:00" />
              </div>
            </div>
            <div class="col-4">
              <div class="form-group">
                <label>Исход лечения</label>
                <select class="form-control">
                  <option>Выздоровление</option>
                  <option selected>Улучшение</option>
                  <option>Без изменений</option>
                  <option>Ухудшение</option>
                  <option>Летальный исход</option>
                </select>
              </div>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-6">
              <div class="form-group">
                <label>Диагноз при поступлении</label>
                <input class="form-control" type="text"
                       value="G80.1 Спастическая диплегия" readonly />
              </div>
            </div>
            <div class="col-6">
              <div class="form-group">
                <label>Диагноз заключительный</label>
                <input class="form-control" type="text"
                       placeholder="Заключительный диагноз" />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="discharge-summary-field">Текст выписного эпикриза</label>
            <textarea id="discharge-summary-field" class="form-control" style="min-height:220px;"
                      placeholder="ДӘУРЕНҚЫЗЫ ТОМИРИС, 08.01.2014 г.р. (12 лет), находилась на стационарном лечении в отделении детской неврологии с 13.04.2026 по ..."></textarea>
          </div>

          <div class="form-group">
            <label>Рекомендации при выписке</label>
            <textarea class="form-control" style="min-height:100px;"
                      placeholder="Режим, диета, медикаменты, явка на контроль..."></textarea>
          </div>

          <div class="d-flex gap-2 mt-3">
            <button class="btn primary" data-action="save-form" data-toast-target="Эпикриз">Сохранить</button>
            <button class="btn ghost">Печать</button>
          </div>

        </div>
      </div>

    </div>

    <script src="../assets/mock.js"></script>
  </body>
</html>
